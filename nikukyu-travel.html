<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>肉球トラベル｜旅行するなら、どこへ行きたい？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&family=Reggae+One&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1822;
    --paper:#f3e8d2;
    --paper2:#fffdf6;
    --pink:#ff6f8d;
    --pink-d:#d94f6e;
    --grape:#34294f;
    --grape-l:#6b5b86;
    --sky:#3fb0c7;
    --sky-d:#2a8497;
    --sun:#ffce3d;
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","YuGothic","Noto Sans JP",sans-serif;
    --display:"Mochiy Pop One",var(--jp);
    --pop:"Reggae One",var(--display);
    --hand:"Yusei Magic",var(--jp);
    --hard:6px 6px 0 var(--ink);
    --hard-sm:4px 4px 0 var(--ink);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--jp);color:var(--ink);
    background-color:var(--paper);
    background-image:
      radial-gradient(circle, rgba(28,24,34,.09) 1.2px, transparent 1.4px),
      linear-gradient(180deg,#f7eedb,#efe1c7);
    background-size:11px 11px, 100% 100%;
    height:100dvh;display:flex;justify-content:center;align-items:stretch;
    padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    overflow:hidden;
  }
  .app{width:100%;max-width:460px;margin:0 auto;padding:8px 0 4px;display:flex;flex-direction:column;height:100%;}

  /* ===== manga koma panel ===== */
  .panel{
    background:var(--paper2);border:4px solid var(--ink);border-radius:22px;
    box-shadow:var(--hard);padding:12px 16px 12px;position:relative;overflow:hidden;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;
  }
  .panel::after{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(circle, rgba(28,24,34,.05) 1px, transparent 1.2px);
    background-size:9px 9px;}
  .panel>*{position:relative;z-index:1;}
  /* corner speed-line accents */
  .panel .corner{position:absolute;width:120px;height:120px;z-index:0;opacity:.9;pointer-events:none;
    background:repeating-conic-gradient(from 0deg, rgba(28,24,34,.06) 0deg 1.2deg, transparent 1.2deg 5deg);}
  .panel .corner.tr{top:-60px;right:-60px;}
  .panel .corner.bl{bottom:-60px;left:-60px;}

  /* ===== topbar ===== */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 2px;}
  .logo{font-family:var(--pop);font-size:20px;letter-spacing:.01em;display:flex;align-items:center;gap:7px;color:var(--ink);}
  .logo .pawmark{display:inline-grid;place-items:center;width:30px;height:30px;background:var(--pink);
    border:3px solid var(--ink);border-radius:50%;font-size:15px;transform:rotate(-10deg);box-shadow:var(--hard-sm);}
  .sound-btn{font-family:var(--display);font-size:12px;background:var(--sun);border:3px solid var(--ink);
    border-radius:999px;padding:7px 13px;cursor:pointer;box-shadow:var(--hard-sm);display:flex;align-items:center;gap:5px;
    transition:transform .05s,box-shadow .05s;}
  .sound-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .sound-btn.off{background:#e6dfce;color:#938b7c;}

  /* ===== speech bubble ===== */
  .bubble{background:#fff;border:3.5px solid var(--ink);border-radius:24px;padding:15px 18px;
    position:relative;text-align:center;margin:8px 4px 4px;box-shadow:var(--hard-sm);}
  .bubble::before{content:"";position:absolute;left:40px;bottom:-16px;width:22px;height:22px;background:#fff;
    border-right:3.5px solid var(--ink);border-bottom:3.5px solid var(--ink);transform:rotate(40deg) skew(-6deg);}
  .bubble .l1{font-family:var(--hand);font-size:17px;color:#6b6258;}
  .bubble .l2{font-family:var(--pop);font-size:25px;line-height:1.32;margin-top:3px;letter-spacing:.01em;}
  .bubble .l2 .ruby{font-size:10px;color:var(--pink-d);display:block;font-family:var(--jp);font-weight:700;margin-bottom:-2px;}

  /* ===== start mascot button ===== */
  #screen-start{justify-content:center;}
  .stage{display:flex;flex-direction:column;align-items:center;margin-top:8px;}
  .mascot-btn{border:none;background:none;cursor:pointer;padding:0;position:relative;display:grid;place-items:center;}
  .mascot-btn .bear{width:clamp(130px,36vw,170px);height:auto;display:block;animation:bob 2.6s ease-in-out infinite;filter:drop-shadow(5px 6px 0 rgba(28,24,34,.18));}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
  .mascot-btn:active .bear{transform:scale(.93) translateY(3px);animation:none;}
  .tap-badge{margin-top:6px;font-family:var(--pop);font-size:15px;background:var(--pink);color:#fff;
    border:3px solid var(--ink);border-radius:999px;padding:8px 20px;box-shadow:var(--hard-sm);
    display:flex;align-items:center;gap:7px;animation:badge 1.6s ease-in-out infinite;}
  @keyframes badge{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  /* ===== home hero (華やか) ===== */
  .hero{position:relative;flex:1 1 auto;min-height:0;display:grid;place-items:center;overflow:hidden;margin:4px 0 8px;}
  .hero .rays{position:absolute;width:155%;aspect-ratio:1;border-radius:50%;
    background:repeating-conic-gradient(from 0deg, rgba(255,206,61,.24) 0deg 7deg, transparent 7deg 15deg);
    animation:spin 22s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hero .glow{position:absolute;width:66%;aspect-ratio:1;border-radius:50%;
    background:radial-gradient(circle, rgba(255,141,166,.55), rgba(255,141,166,0) 70%);animation:glow 3s ease-in-out infinite;}
  @keyframes glow{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
  .hero .mascot-btn{position:relative;z-index:2;}
  .hero .deco{position:absolute;z-index:1;font-size:clamp(20px,6vw,28px);opacity:.92;
    filter:drop-shadow(1px 2px 2px rgba(0,0,0,.15));animation:floaty 4s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-7deg)}50%{transform:translateY(-10px) rotate(7deg)}}
  .hero .d1{top:5%;left:7%;animation-delay:0s}
  .hero .d2{top:3%;right:8%;animation-delay:.6s}
  .hero .d3{top:43%;left:2%;animation-delay:1.1s}
  .hero .d4{top:40%;right:2%;animation-delay:.3s}
  .hero .d5{bottom:7%;left:11%;animation-delay:1.5s}
  .hero .d6{bottom:5%;right:11%;animation-delay:.9s}
  .hero .spark{position:absolute;z-index:3;font-size:16px;animation:twinkle 2.2s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:1;transform:scale(1.1)}}
  .hero .s1{top:16%;right:23%;animation-delay:.2s}
  .hero .s2{bottom:20%;left:21%;animation-delay:1s}
  .hero .s3{top:30%;left:29%;animation-delay:1.7s}
  .cta-area{flex:0 0 auto;display:flex;flex-direction:column;gap:9px;}
  .cta-btn{position:relative;overflow:hidden;width:100%;border:3.5px solid var(--ink);border-radius:18px;
    background:linear-gradient(135deg,#ff95b1,#ff6f8d 48%,#ff9b59);color:#fff;cursor:pointer;
    padding:11px 14px;box-shadow:var(--hard);display:flex;flex-direction:column;align-items:center;gap:1px;
    animation:ctaPulse 2.4s ease-in-out infinite;}
  @keyframes ctaPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .cta-btn:active{transform:translate(3px,3px)!important;box-shadow:3px 3px 0 var(--ink);animation:none;}
  .cta-btn .cta-text{font-family:var(--pop);font-size:clamp(17px,5.2vw,20px);text-shadow:1px 2px 0 rgba(0,0,0,.18);display:flex;align-items:center;gap:8px;}
  .cta-btn .cta-sub{font-family:var(--jp);font-weight:700;font-size:11px;opacity:.96;}
  .cta-btn::after{content:"";position:absolute;top:-10%;left:-60%;width:40%;height:120%;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.6),transparent);transform:skewX(-18deg);animation:shine 2.9s ease-in-out infinite;}
  @keyframes shine{0%{left:-60%}55%{left:130%}100%{left:130%}}

  .or{display:flex;align-items:center;gap:10px;color:#9a9082;font-size:12px;margin:12px 4px 8px;font-family:var(--display);}
  .or::before,.or::after{content:"";flex:1;height:2.5px;background:#dccfb6;border-radius:2px;}

  .ghost-btn{width:100%;font-family:var(--display);font-size:15px;background:#fff;color:var(--ink);
    border:3px solid var(--ink);border-radius:15px;padding:13px;cursor:pointer;box-shadow:var(--hard-sm);
    transition:transform .05s,box-shadow .05s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .ghost-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}

  /* ===== questions ===== */
  .q-title{font-family:var(--pop);font-size:15px;margin:2px 4px 7px;text-align:center;flex:0 0 auto;}
  .q-group{margin-bottom:8px;}
  .q-label{font-family:var(--display);font-size:12.5px;margin:0 0 5px 2px;display:flex;align-items:center;gap:7px;}
  .q-label .dot{width:13px;height:13px;background:var(--pink);border:2.5px solid var(--ink);border-radius:50%;}
  .q-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-family:var(--jp);font-weight:700;font-size:12px;background:#fff;border:2.5px solid var(--ink);
    border-radius:999px;padding:6px 11px;cursor:pointer;transition:all .08s;color:var(--ink);}
  .chip:active{transform:scale(.94);}
  .chip.on{background:var(--pink);color:#fff;box-shadow:3px 3px 0 var(--ink);}
  .go-row{margin-top:8px;flex:0 0 auto;}
  .primary-btn{width:100%;font-family:var(--pop);font-size:15px;color:#fff;background:var(--pink);
    border:3.5px solid var(--ink);border-radius:14px;padding:12px;cursor:pointer;box-shadow:var(--hard);
    transition:transform .05s,box-shadow .05s;display:flex;align-items:center;justify-content:center;gap:9px;}
  .primary-btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink);}
  .back-link{display:block;margin:7px auto 0;font-size:13px;color:#7a7268;background:none;border:none;
    cursor:pointer;font-family:var(--hand);text-decoration:underline;}

  /* ===== result ===== */
  .result-card{animation:pop .5s cubic-bezier(.18,1.5,.5,1) both;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
  @keyframes pop{0%{transform:scale(.5) rotate(-5deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .verdict{font-family:var(--hand);text-align:center;font-size:14px;color:var(--pink-d);margin:1px 0 6px;flex:0 0 auto;}
  .postcard{border:3.5px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:var(--hard-sm);display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
  .photo{flex:1 1 0;min-height:84px;position:relative;display:grid;place-items:center;
    background-image:radial-gradient(circle, rgba(255,255,255,.16) 1.5px, transparent 1.7px);background-size:14px 14px;}
  .photo .real-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .55s ease;}
  .photo .real-photo.show{opacity:1;}
  .photo .emoji{font-size:82px;filter:drop-shadow(2px 3px 5px rgba(0,0,0,.28));position:relative;z-index:1;}
  .photo .name-bubble{position:absolute;z-index:3;bottom:-2px;left:50%;transform:translate(-50%,42%);
    background:#fff;border:3.5px solid var(--ink);border-radius:15px;padding:7px 20px;font-family:var(--pop);
    font-size:clamp(15px,4.8vw,22px);white-space:normal;text-align:center;line-height:1.2;max-width:90%;box-shadow:var(--hard-sm);}
  .photo .scope-tag{position:absolute;z-index:3;top:11px;left:11px;background:var(--sun);border:2.5px solid var(--ink);
    border-radius:999px;font-size:11px;font-weight:700;padding:4px 12px;}
  .photo .theme-tag{position:absolute;z-index:3;top:11px;right:11px;background:#fff;border:2.5px solid var(--ink);
    border-radius:999px;font-size:11px;font-weight:700;padding:4px 12px;}
  .desc{padding:32px 16px 4px;font-size:13px;line-height:1.5;color:#3a352e;flex:0 0 auto;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .facts{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:8px 12px 2px;flex:0 0 auto;}
  .fact{background:var(--paper);border:2.5px solid var(--ink);border-radius:10px;padding:6px 5px;text-align:center;}
  .fact .ico{font-size:15px;}
  .fact .k{font-size:9.5px;color:#8a8378;margin:1px 0 1px;font-weight:700;}
  .fact .v{font-size:11px;font-weight:700;line-height:1.25;}
  .actions{display:flex;flex-direction:column;gap:7px;padding:8px 12px 2px;flex:0 0 auto;}
  .maps-btn{font-family:var(--display);font-size:13px;color:#fff;text-decoration:none;background:var(--sky);
    border:3px solid var(--ink);border-radius:12px;padding:10px;text-align:center;box-shadow:var(--hard-sm);
    transition:transform .05s,box-shadow .05s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .maps-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .again-btn{font-family:var(--pop);font-size:14px;color:#fff;background:var(--pink);border:3px solid var(--ink);
    border-radius:12px;padding:10px;cursor:pointer;box-shadow:var(--hard-sm);transition:transform .05s,box-shadow .05s;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .again-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .act-row{display:flex;gap:8px;}
  .act-row>*{flex:1;}
  .act-row .ghost-btn{font-size:12px;padding:9px;}

  .screen{display:none;}
  .screen.active{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}

  /* ===== fling cinematic overlay ===== */
  .fling{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;overflow:hidden;
    background:radial-gradient(circle at 50% 62%, rgba(243,232,210,.92), rgba(239,225,199,.98));}
  .fling.show{display:flex;}
  .fling .speedlines{position:absolute;inset:-10%;opacity:0;
    background:repeating-conic-gradient(from 0deg at 50% 56%, rgba(28,24,34,.92) 0deg 1.3deg, transparent 1.3deg 4.6deg);
    -webkit-mask:radial-gradient(circle at 50% 56%, transparent 18%, #000 44%);
            mask:radial-gradient(circle at 50% 56%, transparent 18%, #000 44%);}
  .fling .speedlines.go{animation:lines .55s ease-out forwards;}
  @keyframes lines{0%{opacity:0;transform:scale(1.7)}28%{opacity:1}100%{opacity:1;transform:scale(1)}}
  .char-stage{position:relative;z-index:2;opacity:0;transform:translateY(70px) scale(.88);}
  .char-stage .bear{width:min(74vw,260px);height:auto;filter:drop-shadow(7px 8px 0 rgba(28,24,34,.2));}
  .char-stage.enter{animation:charIn .5s cubic-bezier(.2,1.35,.4,1) forwards;}
  @keyframes charIn{to{opacity:1;transform:translateY(0) scale(1)}}
  .char-stage.thrust{animation:charLunge .42s ease-in forwards;}
  @keyframes charLunge{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-6px) scale(1.04) rotate(-2deg)}100%{transform:translateY(8px) scale(1.14) rotate(1deg)}}
  .char-stage.thrust .paw-group{animation:pawThrust .42s ease-out forwards;transform-origin:80% 60%;}
  @keyframes pawThrust{0%{transform:scale(1)}100%{transform:translate(-26px,34px) scale(1.95)}}
  .char-bubble{position:absolute;z-index:3;top:8%;left:50%;transform:translateX(-50%) scale(0);
    background:#fff;border:4px solid var(--ink);border-radius:24px;padding:14px 22px;text-align:center;
    box-shadow:var(--hard);white-space:normal;max-width:84vw;}
  .char-bubble::after{content:"";position:absolute;left:50%;bottom:-17px;width:24px;height:24px;background:#fff;
    border-right:4px solid var(--ink);border-bottom:4px solid var(--ink);transform:translateX(-50%) rotate(45deg);}
  .char-bubble .l1{font-family:var(--hand);font-size:18px;color:#6b6258;display:block;}
  .char-bubble .l2{font-family:var(--pop);font-size:24px;margin-top:2px;}
  .char-bubble.show{animation:bubbleIn .32s cubic-bezier(.2,1.6,.4,1) forwards;}
  @keyframes bubbleIn{to{transform:translateX(-50%) scale(1)}}
  .char-bubble.hide{animation:bubbleOut .2s ease-in forwards;}
  @keyframes bubbleOut{to{transform:translateX(-50%) scale(0);opacity:0}}
  .flash{position:absolute;inset:0;z-index:5;background:#fff;opacity:0;pointer-events:none;}
  .flash.go{animation:flash .34s ease-out forwards;}
  @keyframes flash{0%{opacity:0}45%{opacity:1}100%{opacity:0}}
  .skip-hint{position:absolute;z-index:4;bottom:30px;left:50%;transform:translateX(-50%);
    font-family:var(--hand);font-size:13px;color:#8a8174;background:rgba(255,255,255,.7);
    padding:5px 14px;border-radius:999px;}

  .app.shake{animation:shake .42s ease-in-out;}
  @keyframes shake{0%,100%{transform:translate(0,0)}15%{transform:translate(-7px,4px)}30%{transform:translate(8px,-4px)}45%{transform:translate(-6px,5px)}60%{transform:translate(6px,-3px)}80%{transform:translate(-3px,2px)}}

  .credit{text-align:center;font-size:9px;color:#a59c8d;margin-top:4px;line-height:1.45;flex:0 0 auto;line-break:strict;word-break:normal;overflow-wrap:anywhere;}
  .credit .nb{white-space:nowrap;}

  @media (prefers-reduced-motion: reduce){
    .mascot-btn .bear,.tap-badge,.result-card,.char-stage,.char-bubble,.speedlines,.flash,.hero .rays,.hero .glow,.hero .deco,.hero .spark,.cta-btn,.cta-btn::after{animation:none!important;}
    .app.shake{animation:none!important;}
  }

  /* ===== top actions / dex ===== */
  .top-actions{display:flex;gap:8px;align-items:center;}
  .dex-btn{font-size:16px;background:#fff;border:3px solid var(--ink);border-radius:999px;padding:6px 12px;cursor:pointer;box-shadow:var(--hard-sm);line-height:1;}
  .dex-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .cta-row{display:flex;gap:9px;}
  .cta-row>*{flex:1;}
  .share-btn{font-family:var(--display);font-size:13px;color:var(--ink);background:var(--sun);border:3px solid var(--ink);border-radius:12px;padding:10px;cursor:pointer;box-shadow:var(--hard-sm);display:flex;align-items:center;justify-content:center;gap:6px;}
  .share-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  /* ===== choose (3択) ===== */
  .choose-body{flex:1 1 auto;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:2px 2px 4px;}
  .choice{display:grid;grid-template-columns:62px 1fr auto;align-items:center;gap:11px;text-align:left;background:#fff;border:3px solid var(--ink);border-radius:16px;padding:8px;cursor:pointer;box-shadow:var(--hard-sm);animation:pop .4s both;}
  .choice:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .choice-photo{width:62px;height:62px;border-radius:12px;border:2.5px solid var(--ink);display:grid;place-items:center;font-size:32px;position:relative;}
  .choice-scope{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;background:var(--sun);border:2px solid var(--ink);border-radius:999px;padding:1px 7px;}
  .choice-txt{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .choice-name{font-family:var(--pop);font-size:16px;}
  .choice-meta{font-size:10.5px;color:#7a7268;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .choice-go{font-family:var(--pop);font-size:12px;color:#fff;background:var(--pink);border:2.5px solid var(--ink);border-radius:999px;padding:7px 11px;white-space:nowrap;}
  /* ===== dex ===== */
  .dex-head{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;margin-bottom:6px;}
  .dex-reset{font-size:11px;font-weight:700;color:var(--pink-d);background:#fff;border:2.5px solid var(--ink);border-radius:999px;padding:5px 11px;cursor:pointer;}
  .dex-reset:active{transform:translate(1px,1px);}
  .dex-body{flex:1 1 auto;min-height:0;overflow-y:auto;padding-right:2px;}
  .dex-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px;}
  .dex-stat{background:var(--paper);border:2.5px solid var(--ink);border-radius:12px;padding:8px 4px;text-align:center;}
  .dex-k{font-size:9.5px;color:#8a8378;font-weight:700;}
  .dex-v{font-family:var(--pop);font-size:18px;line-height:1.2;}
  .dex-v span{font-size:11px;color:#8a8378;}
  .dex-bar{height:13px;background:#e7dcc6;border:2.5px solid var(--ink);border-radius:999px;overflow:hidden;}
  .dex-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--sun));}
  .dex-pct{text-align:center;font-family:var(--pop);font-size:12px;margin:4px 0 9px;}
  .dex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .dex-cell{position:relative;background:#fff;border:2.5px solid var(--ink);border-radius:12px;padding:7px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .dex-cell:active{transform:scale(.94);}
  .dex-emoji{width:38px;height:38px;border-radius:9px;border:2px solid var(--ink);display:grid;place-items:center;font-size:21px;}
  .dex-name{font-size:9.5px;font-weight:700;line-height:1.12;text-align:center;}
  .dex-badge{position:absolute;top:-5px;right:-5px;background:var(--pink);color:#fff;font-size:9px;font-weight:700;border:2px solid var(--ink);border-radius:999px;padding:0 5px;}
  .dex-empty{text-align:center;color:#8a8378;font-size:13px;margin-top:34px;line-height:1.9;}
  /* ===== toast / confetti ===== */
  #toast{position:fixed;left:50%;bottom:46px;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;transition:all .25s;z-index:120;pointer-events:none;max-width:84vw;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:96;overflow:hidden;}
  .confetti .cf{position:absolute;top:-24px;animation:fall linear forwards;}
  @keyframes fall{0%{transform:translateY(-24px) rotate(0);opacity:1}100%{transform:translateY(112vh) rotate(560deg);opacity:.85}}
</style>

/* =========================================================
   8bit / ファミコン風サウンド（Web Audio APIで合成）
   ========================================================= */
const Chip = (() => {
  let ctx=null,bgmGain=null,sfxGain=null,noiseBuf=null;
  let playing=false,wanted=true,timer=null,step=0,nextTime=0;
  const BPM=144, stepDur=(60/BPM)/4; // 16分音符

  const NAMES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  function freq(n){const m=n.match(/^([A-G]#?)(\d)$/);const i=NAMES.indexOf(m[1]);const o=+m[2];
    const semi=(i-9)+(o-4)*12;return 440*Math.pow(2,semi/12);}

  // 4小節ループ
  const _ = "";
  const mB1=["E5",_,"G5",_,"C6",_,_,"G5","E5",_,"C5",_,"E5",_,_,_];
  const mB2=["D5",_,"G5",_,"B5",_,_,"G5","D5",_,"B4",_,"D5",_,_,_];
  const mB3=["C5",_,"E5",_,"A5",_,_,"E5","C5",_,"A4",_,"C5",_,_,_];
  const mB4=["A4",_,"C5",_,"F5",_,_,"C5","A4",_,"F4",_,"A4",_,"C5","D5"];
  const MEL=[...mB1,...mB2,...mB3,...mB4];
  const bass=(lo,hi)=>[lo,_,_,_,hi,_,_,_,lo,_,_,_,hi,_,_,_];
  const BASS=[...bass("C3","G3"),...bass("G2","D3"),...bass("A2","E3"),...bass("F2","C3")];

  function ensure(){
    if(ctx)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    bgmGain=ctx.createGain();bgmGain.gain.value=0;bgmGain.connect(ctx.destination);
    sfxGain=ctx.createGain();sfxGain.gain.value=0.9;sfxGain.connect(ctx.destination);
    const n=ctx.sampleRate*0.4;noiseBuf=ctx.createBuffer(1,n,ctx.sampleRate);
    const d=noiseBuf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
  }
  function resume(){if(ctx&&ctx.state==="suspended")ctx.resume();}

  function tone(f,t,dur,{type="square",g=0.11,lp=4200,out=null}={}){
    out=out||bgmGain;
    const o=ctx.createOscillator(),ga=ctx.createGain(),fl=ctx.createBiquadFilter();
    o.type=type;o.frequency.value=f;fl.type="lowpass";fl.frequency.value=lp;
    o.connect(fl);fl.connect(ga);ga.connect(out);
    ga.gain.setValueAtTime(0.0001,t);
    ga.gain.exponentialRampToValueAtTime(g,t+0.008);
    ga.gain.setValueAtTime(g,t+dur*0.55);
    ga.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t);o.stop(t+dur+0.02);
  }
  function noise(t,{dur=0.06,hp=8000,g=0.1,out=null}={}){
    out=out||bgmGain;
    const s=ctx.createBufferSource();s.buffer=noiseBuf;
    const f=ctx.createBiquadFilter();f.type="highpass";f.frequency.value=hp;
    const ga=ctx.createGain();s.connect(f);f.connect(ga);ga.connect(out);
    ga.gain.setValueAtTime(g,t);ga.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.start(t);s.stop(t+dur+0.02);
  }
  function kick(t){
    const o=ctx.createOscillator(),ga=ctx.createGain();
    o.type="triangle";o.frequency.setValueAtTime(165,t);o.frequency.exponentialRampToValueAtTime(48,t+0.09);
    ga.gain.setValueAtTime(0.5,t);ga.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
    o.connect(ga);ga.connect(bgmGain);o.start(t);o.stop(t+0.14);
  }
  function scheduleStep(s,t){
    const m=MEL[s];if(m)tone(freq(m),t,0.155,{type:"square",g:0.10,lp:4600});
    const b=BASS[s];if(b)tone(freq(b),t,0.2,{type:"triangle",g:0.17,lp:2200});
    if(s%4===0)kick(t);
    if(s%8===4)noise(t,{dur:0.12,hp:1800,g:0.26});      // snare
    if(s%2===0)noise(t,{dur:0.03,hp:9500,g:0.06});      // hat
  }
  function loop(){
    while(nextTime<ctx.currentTime+0.12){scheduleStep(step,nextTime);nextTime+=stepDur;step=(step+1)%64;}
    timer=setTimeout(loop,25);
  }
  function start(){
    ensure();resume();if(playing||!wanted)return;playing=true;
    step=0;nextTime=ctx.currentTime+0.1;
    bgmGain.gain.cancelScheduledValues(ctx.currentTime);
    bgmGain.gain.setValueAtTime(0.0001,ctx.currentTime);
    bgmGain.gain.exponentialRampToValueAtTime(0.5,ctx.currentTime+0.8);
    loop();
  }
  function stop(){if(!playing)return;playing=false;clearTimeout(timer);
    bgmGain.gain.cancelScheduledValues(ctx.currentTime);
    bgmGain.gain.setValueAtTime(bgmGain.gain.value,ctx.currentTime);
    bgmGain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.4);}
  function toggle(){ensure();resume();wanted=!wanted;wanted?start():stop();return wanted;}

  // SFX
  function blip(){ensure();resume();const t=ctx.currentTime;
    tone(freq("E5"),t,0.06,{g:0.28,out:sfxGain});tone(freq("A5"),t+0.07,0.07,{g:0.28,out:sfxGain});}
  function launch(){ensure();resume();const t=ctx.currentTime;
    const o=ctx.createOscillator(),ga=ctx.createGain();
    o.type="square";o.frequency.setValueAtTime(1320,t);o.frequency.exponentialRampToValueAtTime(170,t+0.24);
    ga.gain.setValueAtTime(0.0001,t);ga.gain.exponentialRampToValueAtTime(0.4,t+0.01);
    ga.gain.exponentialRampToValueAtTime(0.0001,t+0.26);
    o.connect(ga);ga.connect(sfxGain);o.start(t);o.stop(t+0.28);
    const s=ctx.createBufferSource();s.buffer=noiseBuf;const f=ctx.createBiquadFilter();
    f.type="bandpass";f.frequency.setValueAtTime(2200,t);f.frequency.exponentialRampToValueAtTime(380,t+0.26);
    const ng=ctx.createGain();s.connect(f);f.connect(ng);ng.connect(sfxGain);
    ng.gain.setValueAtTime(0.3,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.28);s.start(t);s.stop(t+0.3);}
  function reveal(){ensure();resume();const t=ctx.currentTime;
    ["C5","E5","G5","C6"].forEach((n,i)=>tone(freq(n),t+i*0.07,0.13,{type:"square",g:0.3,lp:6500,out:sfxGain}));
    tone(freq("C6"),t+0.28,0.45,{type:"square",g:0.32,lp:6500,out:sfxGain});}
  return {start,toggle,blip,launch,reveal,isWanted:()=>wanted};
})();

/* =========================================================
   Googleマップ写真（任意・キーがある時だけ）
   ========================================================= */
let mapsPromise=null;
function loadMaps(){
  if(!GOOGLE_MAPS_API_KEY)return Promise.reject("no-key");
  if(mapsPromise)return mapsPromise;
  mapsPromise=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://maps.googleapis.com/maps/api/js?key="+GOOGLE_MAPS_API_KEY+"&libraries=places&loading=async";
    s.async=true;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  return mapsPromise;
}
function getPhoto(query){
  return loadMaps().then(()=>new Promise(res=>{
    try{
      const svc=new google.maps.places.PlacesService(document.createElement("div"));
      svc.findPlaceFromQuery({query:query,fields:["photos"]},(r,st)=>{
        if(st===google.maps.places.PlacesServiceStatus.OK&&r&&r[0]&&r[0].photos&&r[0].photos.length)
          res(r[0].photos[0].getUrl({maxWidth:800,maxHeight:520}));
        else res(null);
      });
    }catch(e){res(null);}
  })).catch(()=>null);
}

function matchList(f){
  const byScope=a=>f.scope==="any"||a.scope===f.scope;
  const byBudget=a=>f.budget==="any"||a.costMin<=Number(f.budget);
  const byTime=a=>{if(f.time==="any")return true;if(f.time==="480plus")return a.min>=480;return a.min<=Number(f.time);};
  const byTheme=a=>f.theme==="any"||a.themes.includes(f.theme);
  let relaxed=false,r=DESTS.filter(a=>byScope(a)&&byBudget(a)&&byTime(a)&&byTheme(a));
  if(!r.length){relaxed=true;r=DESTS.filter(a=>byScope(a)&&byBudget(a)&&byTime(a));} // テーマ緩和
  if(!r.length){r=DESTS.filter(a=>byScope(a)&&byTime(a));}                            // 予算緩和
  if(!r.length){r=DESTS.filter(a=>byScope(a));}                                       // 時間緩和
  if(!r.length){r=DESTS.slice();}                                                     // 範囲緩和
  return {list:r,relaxed};
}

const charBubble=document.getElementById("charBubble");
const speedlines=document.getElementById("speedlines");
const flash=document.getElementById("flash");
const app=document.getElementById("app");

function shake(){if(reduced)return;app.classList.remove("shake");void app.offsetWidth;app.classList.add("shake");setTimeout(()=>app.classList.remove("shake"),460);}

function runFling(filter){
  lastFilter=filter;Chip.start();
  const {list,relaxed}=matchList(filter);
  let d=pick(list);if(list.length>1&&d.name===lastShown)d=pick(list);lastShown=d.name;

  if(reduced){Chip.launch();renderResult(d,relaxed);Chip.reveal();return;}

  let t1,t2,t3,done=false;
  fling.classList.add("show");
  charStage.classList.add("enter");
  charBubble.classList.add("show");
  Chip.blip();

  t1=setTimeout(()=>{                       // 肉球ブッ！
    charBubble.classList.add("hide");
    charStage.classList.add("thrust");
    speedlines.classList.add("go");
    Chip.launch();shake();
  },950);
  t2=setTimeout(()=>flash.classList.add("go"),1330);
  t3=setTimeout(finish,1640);

  function finish(){
    if(done)return;done=true;
    clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);
    fling.classList.remove("show");
    charStage.classList.remove("enter","thrust");
    charBubble.classList.remove("show","hide");
    speedlines.classList.remove("go");flash.classList.remove("go");
    fling.onclick=null;
    renderResult(d,relaxed);Chip.reveal();
  }
  fling.onclick=finish; // タップでスキップ
}

function renderResult(d,relaxed,opts){
  opts=opts||{};
  const scope=d.scope==="domestic"?"国内":"海外";
  const verdict=relaxed?"ピッタリは無かったから、近いところへ飛ばしたよ！"
    :pick(["ポフンッ！着いた先は…","ニクキューッ！キミの旅先は…","ビュンッと飛んできた！行き先は…"]);
  const url="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(d.maps);
  document.getElementById("resultCard").innerHTML=`
    <p class="verdict">${verdict}</p>
    <div class="postcard">
      <div class="photo" style="background:linear-gradient(135deg,${d.grad[0]},${d.grad[1]})">
        <img class="real-photo" alt="">
        <span class="scope-tag">${scope}</span>
        <span class="theme-tag">${d.themes[0]}</span>
        <span class="emoji">${d.emoji}</span>
        <span class="name-bubble">${d.name}</span>
      </div>
      <p class="desc">${d.desc}</p>
      <div class="facts">
        <div class="fact"><div class="ico">💰</div><div class="k">費用目安</div><div class="v">${d.cost}</div></div>
        <div class="fact"><div class="ico">📏</div><div class="k">東京から</div><div class="v">${d.dist}</div></div>
        <div class="fact"><div class="ico">⏱️</div><div class="k">所要時間</div><div class="v">${d.time}</div></div>
      </div>
      <div class="actions">
        <div class="act-row">
          <a class="maps-btn" href="${url}" target="_blank" rel="noopener">📍 マップ</a>
          <button class="share-btn" id="share">📤 シェア</button>
        </div>
        <button class="again-btn" id="again">🐾 もう一回ポフッと飛ばす</button>
        <div class="act-row">
          <button class="ghost-btn" id="change">🧭 条件を変える</button>
          <button class="ghost-btn" id="reset">↩ 最初にもどる</button>
        </div>
      </div>
    </div>`;
  show("result");
  if(opts.record!==false) recordVisit(d);
  if(opts.confetti!==false) confettiBurst();
  const _sb=document.getElementById("share"); if(_sb) _sb.addEventListener("click",()=>shareResult(d));
  document.getElementById("again").addEventListener("click",()=>runFling(lastFilter));
  document.getElementById("change").addEventListener("click",()=>show("questions"));
  document.getElementById("reset").addEventListener("click",()=>show("start"));

  // 写真：Googleキーがあれば実写、無ければWikipediaから無料取得（キー不要）
  const _img=document.querySelector("#resultCard .real-photo");
  const _emoji=document.querySelector("#resultCard .emoji");
  if(_img){
    const apply=u=>{ if(u&&_img){ _img.onload=()=>{_img.classList.add("show"); if(_emoji)_emoji.style.opacity="0";}; _img.src=u; } };
    if(GOOGLE_MAPS_API_KEY){ getPhoto(d.maps).then(u=> u?apply(u):(USE_WIKIPEDIA_PHOTOS?getWikiPhoto(d).then(apply):null)); }
    else if(USE_WIKIPEDIA_PHOTOS){ getWikiPhoto(d).then(apply); }
  }
}

/* Wikipedia 無料写真取得（JSONPでCORS回避・キー不要） */
const wikiCache={};
function getWikiPhoto(d){
  const title=(d.wiki||d.name).replace(/\(.*?\)/g,"").split("/")[0].trim();
  if(title in wikiCache) return Promise.resolve(wikiCache[title]);
  return new Promise(res=>{
    let done=false; const cb="__wiki"+Math.random().toString(36).slice(2);
    const s=document.createElement("script");
    const to=setTimeout(()=>fin(null),6000);
    function fin(u){ if(done)return; done=true; clearTimeout(to); wikiCache[title]=u; try{delete window[cb];}catch(e){} if(s.parentNode)s.parentNode.removeChild(s); res(u); }
    window[cb]=function(data){ try{ const pg=data&&data.query&&data.query.pages; if(!pg){fin(null);return;} let best=null,bi=1e9; for(const k in pg){const pp=pg[k]; if(pp.thumbnail&&pp.thumbnail.source){const ix=(pp.index!=null?pp.index:0); if(ix<bi){bi=ix;best=pp.thumbnail.source;}}} fin(best);}catch(e){ fin(null);} };
    s.onerror=()=>fin(null);
    s.src="https://ja.wikipedia.org/w/api.php?action=query&format=json&generator=search&gsrsearch="+encodeURIComponent(title)+"&gsrlimit=3&gsrnamespace=0&prop=pageimages&piprop=thumbnail&pithumbsize=700&callback="+cb;
    document.head.appendChild(s);
  });
}

/* ====== コレクション図鑑＆履歴 ====== */
const Store=(()=>{ let mem={}; return {
  get(k,def){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return (k in mem)?mem[k]:def;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;} }
};})();
const byName={}; DESTS.forEach(x=>byName[x.name]=x);
function recordVisit(d){
  const vis=Store.get("nt_visited",{}); const now=Date.now();
  const e=vis[d.name]||{c:0,first:now}; e.c++; e.last=now; vis[d.name]=e; Store.set("nt_visited",vis);
  let hist=Store.get("nt_history",[]); hist.unshift({name:d.name,ts:now}); Store.set("nt_history",hist.slice(0,60));
}
function openDex(){
  const vis=Store.get("nt_visited",{}); const names=Object.keys(vis); const total=DESTS.length;
  const got=names.length; const draws=names.reduce((s,n)=>s+(vis[n].c||0),0);
  const dom=names.filter(n=>byName[n]&&byName[n].scope==="domestic").length; const ovs=got-dom;
  names.sort((a,b)=>(vis[b].last||0)-(vis[a].last||0));
  const pct=total?Math.round(got/total*100):0;
  const grid=names.map(n=>{const d=byName[n]; if(!d)return ""; return `<button class="dex-cell" data-name="${n}"><span class="dex-emoji" style="background:linear-gradient(135deg,${d.grad[0]},${d.grad[1]})">${d.emoji}</span><span class="dex-name">${n}</span>${vis[n].c>1?`<span class="dex-badge">×${vis[n].c}</span>`:""}</button>`;}).join("");
  const empty=`<p class="dex-empty">まだ旅先がありません。<br>「ポフッと飛ばす！」で集めよう🐾</p>`;
  document.getElementById("dexBody").innerHTML=`
    <div class="dex-stats">
      <div class="dex-stat"><div class="dex-k">集めた旅先</div><div class="dex-v">${got}<span>/${total}</span></div></div>
      <div class="dex-stat"><div class="dex-k">飛んだ回数</div><div class="dex-v">${draws}</div></div>
      <div class="dex-stat"><div class="dex-k">国内/海外</div><div class="dex-v">${dom}<span> / ${ovs}</span></div></div>
    </div>
    <div class="dex-bar"><span style="width:${pct}%"></span></div>
    <div class="dex-pct">${pct}% 制覇</div>
    <div class="dex-grid">${got?grid:empty}</div>`;
  document.querySelectorAll("#dexBody .dex-cell").forEach(b=>b.addEventListener("click",()=>{const d=byName[b.dataset.name]; if(d)renderResult(d,false,{record:false,confetti:false});}));
  show("dex");
}
function resetDex(){ if(confirm("コレクションと履歴をすべて消去しますか？")){ Store.set("nt_visited",{}); Store.set("nt_history",[]); openDex(); } }
/* ====== 3択モード ====== */
function openChoose(){
  const pool=DESTS.slice(), pick3=[];
  while(pick3.length<3 && pool.length){ pick3.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]); }
  Chip.start();
  document.getElementById("chooseBody").innerHTML=pick3.map((d,i)=>{
    const scope=d.scope==="domestic"?"国内":"海外";
    return `<button class="choice" data-name="${d.name}" style="animation-delay:${i*0.08}s">
      <span class="choice-photo" style="background:linear-gradient(135deg,${d.grad[0]},${d.grad[1]})">${d.emoji}<span class="choice-scope">${scope}</span></span>
      <span class="choice-txt"><span class="choice-name">${d.name}</span><span class="choice-meta">💰${d.cost}　⏱${d.time}</span></span>
      <span class="choice-go">これ！</span>
    </button>`;
  }).join("");
  document.querySelectorAll("#chooseBody .choice").forEach(b=>b.addEventListener("click",()=>{const d=byName[b.dataset.name]; Chip.reveal(); renderResult(d,false,{record:true,confetti:true});}));
  show("choose");
}
/* ====== シェア / トースト / 紙吹雪 ====== */
function shareResult(d){
  const text=`肉球トラベルで「${d.name}」に飛ばされた！🐾 ${d.desc}`;
  const url="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(d.maps);
  if(navigator.share){ navigator.share({title:"肉球トラベル",text:text,url:url}).catch(()=>{}); return; }
  const full=text+"\n"+url;
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(full).then(()=>toast("コピーしました！シェアしてね"),()=>toast("コピーできませんでした")); }
  else { try{ window.prompt("コピーしてシェアしてね",full); }catch(e){ toast("シェアに対応していません"); } }
}
function toast(msg){ let t=document.getElementById("toast"); if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);} t.textContent=msg; t.classList.add("show"); clearTimeout(t._to); t._to=setTimeout(()=>t.classList.remove("show"),1900); }
function confettiBurst(){
  if(window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const wrap=document.createElement("div"); wrap.className="confetti"; document.body.appendChild(wrap);
  const cols=["#ff6f8d","#ffce3d","#3fb0c7","#6b5b86","#ff9b59"];
  for(let i=0;i<20;i++){ const s=document.createElement("span"); s.className="cf";
    s.style.left=(Math.random()*100)+"vw"; const sz=7+Math.random()*8; s.style.width=sz+"px"; s.style.height=sz+"px";
    s.style.background=cols[i%cols.length]; s.style.borderRadius=(Math.random()<0.5?"50%":"2px");
    s.style.animationDelay=(Math.random()*0.25)+"s"; s.style.animationDuration=(1.0+Math.random()*0.8)+"s";
    wrap.appendChild(s); }
  setTimeout(()=>wrap.remove(),2300);
}

/* events */
document.getElementById("mascotBtn").addEventListener("click",()=>runFling({scope:"any",time:"any",budget:"any",theme:"any"}));
document.getElementById("flingHome").addEventListener("click",()=>runFling({scope:"any",time:"any",budget:"any",theme:"any"}));
document.getElementById("toQuestions").addEventListener("click",()=>{Chip.start();show("questions");});
document.getElementById("backFromQ").addEventListener("click",()=>show("start"));
document.getElementById("flingFiltered").addEventListener("click",()=>runFling(readFilter()));
document.getElementById("dexBtn").addEventListener("click",openDex);
document.getElementById("dexReset").addEventListener("click",resetDex);
document.getElementById("backFromDex").addEventListener("click",()=>show("start"));
document.getElementById("choose3").addEventListener("click",openChoose);
document.getElementById("backFromChoose").addEventListener("click",()=>show("start"));
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }

const soundBtn=document.getElementById("soundBtn");
soundBtn.addEventListener("click",()=>{
  const on=Chip.toggle();soundBtn.classList.toggle("off",!on);
  document.getElementById("soundIco").textContent=on?"♪":"🔇";
  document.getElementById("soundTxt").textContent=on?"BGM":"OFF";
});
