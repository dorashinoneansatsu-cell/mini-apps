<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#2b1055" />
<title>東京駅ルーレット 🎰</title>

<!-- ====== Webフォント（ポップ系・丸ゴシック） ====== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet" />

<style>
/* =========================================================
   カラーテーマ（キャンディ・ポップ）
   ========================================================= */
:root{
  --pink:    #ff4d8d;
  --yellow:  #ffd23f;
  --cyan:    #2ad4e6;
  --green:   #57e389;
  --orange:  #ff8c42;
  --purple:  #9b5de5;
  --ink:     #2b1055;     /* 文字・濃色 */
  --paper:   #fff7fb;     /* カード地 */
  --shadow:  rgba(43,16,85,.25);

  --bg1:#7b2ff7; --bg2:#f74faf; --bg3:#2ad4e6;
}

/* =========================================================
   ベース
   ========================================================= */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  font-family:"M PLUS Rounded 1c", sans-serif;
  color:var(--ink);
  min-height:100vh;
  min-height:100dvh;
  background:
    radial-gradient(circle at 15% 12%, rgba(255,210,63,.55), transparent 42%),
    radial-gradient(circle at 85% 18%, rgba(42,212,230,.55), transparent 42%),
    radial-gradient(circle at 50% 95%, rgba(87,227,137,.45), transparent 50%),
    linear-gradient(160deg, var(--bg1), var(--bg2) 55%, var(--bg3));
  background-attachment:fixed;
  overflow-x:hidden;
}

/* スクロール可能な本体 */
.app{
  max-width:560px;
  margin:0 auto;
  padding:14px 14px calc(96px + env(safe-area-inset-bottom)) 14px;
  position:relative;
  z-index:2;
}

/* =========================================================
   ヘッダー
   ========================================================= */
header{ text-align:center; padding:10px 0 6px; }
.title{
  font-family:"Mochiy Pop One", sans-serif;
  font-size:clamp(28px, 8.5vw, 42px);
  line-height:1.05;
  color:#fff;
  text-shadow:
    0 2px 0 var(--purple),
    0 4px 0 var(--pink),
    0 7px 12px rgba(0,0,0,.35);
  letter-spacing:1px;
}
.title .emoji{ filter:drop-shadow(0 3px 4px rgba(0,0,0,.3)); }
.subtitle{
  margin-top:6px;
  display:inline-block;
  background:rgba(255,255,255,.9);
  color:var(--ink);
  font-weight:700;
  font-size:12px;
  padding:4px 12px;
  border-radius:999px;
  box-shadow:0 3px 0 var(--shadow);
}

/* サウンド切替ボタン */
.sound-controls{
  display:flex; gap:8px; justify-content:center; margin-top:10px;
}
.snd-btn{
  border:none; cursor:pointer; font-family:inherit; font-weight:800;
  font-size:12px; color:var(--ink);
  background:rgba(255,255,255,.92);
  padding:7px 14px; border-radius:999px;
  box-shadow:0 3px 0 var(--shadow);
  transition:transform .1s, background .2s, opacity .2s;
}
.snd-btn:active{ transform:translateY(2px); }
.snd-btn.off{
  background:rgba(255,255,255,.28); color:#fff;
  opacity:.8; text-decoration:line-through;
}

/* =========================================================
   絞り込みフィルター
   ========================================================= */
.filters{
  display:flex; gap:10px; margin-bottom:8px;
}
.filter-chip{
  flex:1;
  border:none; cursor:pointer;
  font-family:inherit; font-weight:800; font-size:14px;
  color:var(--ink);
  background:rgba(255,255,255,.7);
  padding:12px 6px; border-radius:16px;
  box-shadow:0 4px 0 rgba(0,0,0,.12);
  transition:transform .12s, background .2s, box-shadow .12s, color .2s;
}
.filter-chip:active{ transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.12); }
.filter-chip.on{
  background:linear-gradient(180deg,#7be0ff,var(--cyan));
  color:#03414a;
  box-shadow:0 4px 0 #178a99;
  transform:translateY(-1px);
}
.filter-count{
  text-align:center; color:#fff; font-weight:800; font-size:12px;
  margin-bottom:14px;
  text-shadow:0 1px 3px rgba(0,0,0,.3);
}

/* =========================================================
   タブ
   ========================================================= */
.tabs{
  display:flex;
  gap:8px;
  margin:14px 0 16px;
}
.tab{
  flex:1;
  border:none;
  cursor:pointer;
  font-family:inherit;
  font-weight:800;
  font-size:14px;
  color:var(--ink);
  background:rgba(255,255,255,.65);
  padding:11px 4px;
  border-radius:16px;
  box-shadow:0 4px 0 rgba(0,0,0,.12);
  transition:transform .12s, background .2s, box-shadow .12s;
}
.tab .ic{ display:block; font-size:18px; line-height:1; margin-bottom:2px; }
.tab.active{
  background:#fff;
  color:var(--pink);
  box-shadow:0 4px 0 var(--pink);
  transform:translateY(-2px);
}
.tab:active{ transform:translateY(1px); box-shadow:0 1px 0 rgba(0,0,0,.12); }

/* =========================================================
   パネル共通
   ========================================================= */
.panel{ display:none; animation:fadeIn .35s ease; }
.panel.active{ display:block; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

/* =========================================================
   ルーレット表示（スロット風）
   ========================================================= */
.machine{
  background:linear-gradient(180deg,#fff,#ffeaf3);
  border-radius:26px;
  padding:30px 16px 20px;
  box-shadow:0 10px 0 rgba(0,0,0,.18), inset 0 0 0 5px #fff, inset 0 0 0 9px var(--yellow);
  position:relative;
  overflow:visible;
}
.machine::before{ /* 上部のランプ装飾 */
  content:"";
  position:absolute; top:8px; left:18px; right:18px; height:10px;
  background:
    radial-gradient(circle, var(--pink) 40%, transparent 42%) 0 0/22px 22px repeat-x;
  opacity:.5;
  border-radius:6px;
}
/* ===== 円盤ルーレット ===== */
.wheel-wrap{
  position:relative;
  width:min(82vw, 340px);
  aspect-ratio:1 / 1;
  margin:18px auto 4px;
}
/* 上部の指針（下向き三角） */
.wheel-pointer{
  position:absolute;
  top:-4px; left:50%;
  transform:translateX(-50%);
  width:0; height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:26px solid var(--pink);
  z-index:5;
  filter:drop-shadow(0 3px 3px rgba(0,0,0,.4));
}
.wheel-pointer::after{ /* 指針の付け根の丸 */
  content:"";
  position:absolute; top:-34px; left:50%; transform:translateX(-50%);
  width:18px; height:18px; border-radius:50%;
  background:var(--pink);
  box-shadow:0 2px 4px rgba(0,0,0,.35);
}
/* 円盤本体（回転する） */
.wheel-svg{
  width:100%; height:100%;
  display:block;
  border-radius:50%;
  transform-origin:50% 50%;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.4));
  background:#241046;
}
/* 中心のハブ（回転しない） */
.wheel-center{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%, -50%);
  width:54px; height:54px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #fff, #ffe3ef);
  box-shadow:0 3px 8px rgba(0,0,0,.4), inset 0 0 0 3px var(--yellow);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; z-index:4;
  pointer-events:none;
}


/* スタートボタン（押したくなる） */
.start-btn{
  display:block;
  width:100%;
  margin-top:18px;
  border:none;
  cursor:pointer;
  font-family:"Mochiy Pop One", sans-serif;
  font-size:24px;
  color:#fff;
  padding:18px 10px;
  border-radius:20px;
  background:linear-gradient(180deg,#ff7eb3,var(--pink));
  box-shadow:0 7px 0 #c01f5e, 0 12px 18px rgba(0,0,0,.3);
  transition:transform .1s, box-shadow .1s, filter .2s;
  letter-spacing:1px;
}
.start-btn:active{ transform:translateY(5px); box-shadow:0 2px 0 #c01f5e, 0 6px 10px rgba(0,0,0,.3); }
.start-btn:disabled{ filter:grayscale(.6) brightness(1.05); cursor:not-allowed; }
.start-btn .spark{ animation:spark 1.2s infinite; display:inline-block; }
@keyframes spark{ 0%,100%{transform:scale(1) rotate(0);} 50%{transform:scale(1.25) rotate(12deg);} }

/* =========================================================
   結果カード
   ========================================================= */
.result{
  margin-top:18px;
  background:var(--paper);
  border-radius:24px;
  padding:20px 18px;
  box-shadow:0 10px 0 var(--shadow);
  text-align:center;
  position:relative;
  display:none;
}
.result.show{ display:block; animation:pop .55s cubic-bezier(.18,1.5,.4,1); }
@keyframes pop{ 0%{transform:scale(.4); opacity:0;} 60%{transform:scale(1.08);} 100%{transform:scale(1); opacity:1;} }

.result-badge{
  position:absolute; top:-14px; left:50%; transform:translateX(-50%);
  background:var(--yellow);
  color:var(--ink);
  font-weight:800; font-size:12px;
  padding:5px 16px; border-radius:999px;
  box-shadow:0 4px 0 #c79a00;
  white-space:nowrap;
}
.result-name{
  font-family:"Mochiy Pop One", sans-serif;
  font-size:clamp(30px, 10vw, 46px);
  margin:8px 0 2px;
  color:var(--pink);
  text-shadow:0 2px 0 rgba(0,0,0,.08);
  word-break:keep-all;
  overflow-wrap:anywhere;
}
/* 駅名が長いときはフォントを縮めてはみ出しを防ぐ */
.result-name.name-l2{ font-size:clamp(24px, 7.5vw, 34px); }
.result-name.name-l3{ font-size:clamp(18px, 5.6vw, 26px); }
.result-line{
  display:inline-block;
  background:var(--cyan);
  color:#063;
  color:#03414a;
  font-weight:800;
  font-size:14px;
  padding:5px 14px;
  border-radius:999px;
  margin-bottom:12px;
  box-shadow:0 3px 0 rgba(0,0,0,.15);
}
.result-desc{
  font-size:15px; font-weight:700;
  background:#fff;
  border:2px dashed var(--purple);
  border-radius:14px;
  padding:10px 12px;
  margin:0 0 14px;
}

/* 栄え度（10段階） */
.pop-meter{ margin:0 0 16px; }
.pop-meter .label{ font-size:13px; font-weight:800; margin-bottom:6px; }
.pop-dots{ display:flex; gap:4px; justify-content:center; flex-wrap:wrap; }
.dot{
  width:18px; height:18px; border-radius:50%;
  background:#e7d9f2;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.08);
}
.dot.on{
  background:linear-gradient(180deg,var(--yellow),var(--orange));
  box-shadow:0 2px 4px rgba(255,140,66,.6);
}
.pop-num{ font-weight:800; font-size:13px; margin-top:6px; }

/* アクションボタン群 */
.actions{ display:flex; gap:10px; }
.act-btn{
  flex:1; border:none; cursor:pointer;
  font-family:inherit; font-weight:800; font-size:14px;
  padding:13px 6px; border-radius:16px; color:#fff;
  transition:transform .1s, box-shadow .1s, filter .2s;
}
.act-btn:active{ transform:translateY(3px); }
.maps-btn{ background:linear-gradient(180deg,#62e58e,var(--green)); box-shadow:0 5px 0 #2f9d57; color:#0a3d1f; }
.maps-btn:active{ box-shadow:0 2px 0 #2f9d57; }
.fav-btn{ background:linear-gradient(180deg,#ffb15e,var(--orange)); box-shadow:0 5px 0 #c75e16; }
.fav-btn:active{ box-shadow:0 2px 0 #c75e16; }
.fav-btn.is-fav{ background:linear-gradient(180deg,#ff6fa5,var(--pink)); box-shadow:0 5px 0 #b81e5d; }

/* =========================================================
   リスト（履歴・お気に入り）
   ========================================================= */
.list-head{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.list-title{
  font-family:"Mochiy Pop One", sans-serif;
  color:#fff; font-size:20px;
  text-shadow:0 2px 0 var(--purple), 0 4px 8px rgba(0,0,0,.3);
}
.clear-all{
  border:none; cursor:pointer; font-family:inherit; font-weight:800;
  font-size:12px; color:#fff;
  background:rgba(0,0,0,.25);
  padding:8px 14px; border-radius:999px;
  box-shadow:0 3px 0 rgba(0,0,0,.2);
}
.clear-all:active{ transform:translateY(2px); }

.card{
  background:var(--paper);
  border-radius:18px;
  padding:12px 14px;
  margin-bottom:10px;
  box-shadow:0 5px 0 var(--shadow);
  display:flex; align-items:center; gap:10px;
  animation:slideIn .3s ease;
}
@keyframes slideIn{ from{opacity:0; transform:translateX(-10px);} to{opacity:1; transform:none;} }
.card .info{ flex:1; min-width:0; }
.card .nm{ font-family:"Mochiy Pop One", sans-serif; font-size:18px; color:var(--ink); }
.card .ln{ font-size:12px; font-weight:700; color:var(--purple); }
.card .meta{ font-size:11px; font-weight:700; color:#9a86b3; margin-top:2px; }
.card .mini{
  border:none; cursor:pointer; font-size:18px;
  width:38px; height:38px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:#fff; box-shadow:0 3px 0 rgba(0,0,0,.12);
}
.card .mini:active{ transform:translateY(2px); }
.card .mini.map{ background:var(--green); box-shadow:0 3px 0 #2f9d57; }
.card .mini.del{ background:#ffd0dd; box-shadow:0 3px 0 #e58aa3; }

/* 空状態 */
.empty{
  text-align:center; color:#fff; font-weight:700;
  padding:40px 16px;
  background:rgba(255,255,255,.18);
  border-radius:20px;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.empty .big{ font-size:46px; display:block; margin-bottom:8px; }

/* =========================================================
   紙吹雪キャンバス
   ========================================================= */
#confetti{
  position:fixed; inset:0; width:100%; height:100%;
  pointer-events:none; z-index:50;
}

/* 装飾の浮遊ブロブ（背景） */
.blob{ position:fixed; border-radius:50%; filter:blur(40px); opacity:.35; z-index:1; pointer-events:none; }
.blob.b1{ width:200px; height:200px; background:var(--yellow); top:-40px; left:-50px; }
.blob.b2{ width:240px; height:240px; background:var(--cyan); bottom:-60px; right:-60px; }

.foot{
  text-align:center; color:rgba(255,255,255,.85);
  font-size:11px; font-weight:700; margin-top:20px;
}
</style>
</head>
<body>

<!-- 背景装飾 -->
<div class="blob b1"></div>
<div class="blob b2"></div>

<!-- 紙吹雪 -->
<canvas id="confetti"></canvas>

<div class="app">

  <!-- ========== ヘッダー ========== -->
  <header>
    <h1 class="title"><span class="emoji">🎰</span> 東京駅ルーレット</h1>
    <span class="subtitle">東京都内の現役駅をランダムでお届け！</span>
    <div class="sound-controls">
      <button class="snd-btn" id="bgmBtn">🎵 BGM ON</button>
      <button class="snd-btn" id="sfxBtn">🔊 効果音 ON</button>
    </div>
  </header>

  <!-- ========== タブ ========== -->
  <nav class="tabs">
    <button class="tab active" data-tab="roulette"><span class="ic">🎲</span>ルーレット</button>
    <button class="tab" data-tab="history"><span class="ic">🕘</span>履歴</button>
    <button class="tab" data-tab="favorite"><span class="ic">⭐</span>お気に入り</button>
  </nav>

  <!-- ========== ① ルーレット ========== -->
  <section class="panel active" id="panel-roulette">
    <!-- 絞り込みフィルター -->
    <div class="filters">
      <button class="filter-chip" id="filterWard">🏙 23区だけ</button>
      <button class="filter-chip" id="filterPop">⭐ 栄え度5以上</button>
    </div>
    <div class="filter-count" id="filterCount"></div>

    <div class="machine">
      <div class="wheel-wrap">
        <div class="wheel-pointer"></div>
        <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 200 200" role="img" aria-label="駅ルーレット盤"></svg>
        <div class="wheel-center" id="wheelCenter">🚉</div>
      </div>
      <button class="start-btn" id="startBtn"><span class="spark">✨</span> スタート <span class="spark">✨</span></button>
    </div>

    <!-- ② 結果表示 -->
    <div class="result" id="result">
      <div class="result-badge" id="resultBadge">🎉 今日の駅はここ！ 🎉</div>
      <div class="result-name" id="rName">―</div>
      <div class="result-line" id="rLine">―</div>
      <div class="result-desc" id="rDesc">―</div>

      <div class="pop-meter">
        <div class="label">栄え度</div>
        <div class="pop-dots" id="rDots"></div>
        <div class="pop-num" id="rNum">―</div>
      </div>

      <div class="actions">
        <!-- ③ Google Maps -->
        <button class="act-btn maps-btn" id="mapsBtn">🗺 地図で見る</button>
        <!-- ⑤ お気に入り -->
        <button class="act-btn fav-btn" id="favBtn">⭐ お気に入り</button>
      </div>
    </div>
  </section>

  <!-- ========== ④ 履歴 ========== -->
  <section class="panel" id="panel-history">
    <div class="list-head">
      <span class="list-title">🕘 履歴（最大50件）</span>
      <button class="clear-all" id="clearHistory">全削除</button>
    </div>
    <div id="historyList"></div>
  </section>

  <!-- ========== ⑤ お気に入り ========== -->
  <section class="panel" id="panel-favorite">
    <div class="list-head">
      <span class="list-title">⭐ お気に入り</span>
      <button class="clear-all" id="clearFav">全削除</button>
    </div>
    <div id="favoriteList"></div>
  </section>

  <div class="foot">© 東京駅ルーレット ／ Google Maps連携対応</div>
</div>

<script>
/* =====================================================================
   東京駅ルーレット — メインスクリプト
   ---------------------------------------------------------------------
   構成:
     1) 駅データ (STATIONS)
     2) ストレージ補助 (localStorage / メモリ自動フォールバック)
     3) ルーレット演出
     4) 結果表示・Google Maps・お気に入り
     5) 履歴機能
     6) 紙吹雪エフェクト
   ===================================================================== */

/* =====================================================================
   1) 駅データ
   都内の主要〜ローカル駅を全事業者から約150駅収録（駅名は重複なし）
   { name, line, popularity(1〜10), description }
   ===================================================================== */
const STATIONS = [
  { name:"東京", line:"JR山手線", popularity:10, description:"日本の玄関口、巨大ターミナル", ward:true },
  { name:"有楽町", line:"JR山手線", popularity:8, description:"映画館とガード下グルメ", ward:true },
  { name:"新橋", line:"JR山手線", popularity:8, description:"サラリーマンの聖地SL広場", ward:true },
  { name:"浜松町", line:"JR山手線", popularity:7, description:"モノレールで羽田へ直結", ward:true },
  { name:"田町", line:"JR山手線", popularity:6, description:"オフィスと大学が集う街", ward:true },
  { name:"高輪ゲートウェイ", line:"JR山手線", popularity:6, description:"令和開業の近未来駅", ward:true },
  { name:"品川", line:"JR山手線", popularity:9, description:"新幹線も停まる南の要衝", ward:true },
  { name:"大崎", line:"JR山手線", popularity:6, description:"再開発で生まれたビル街", ward:true },
  { name:"五反田", line:"JR山手線", popularity:6, description:"IT企業も多い飲み屋街", ward:true },
  { name:"目黒", line:"JR山手線", popularity:7, description:"桜の名所と落ち着いた住宅地", ward:true },
  { name:"恵比寿", line:"JR山手線", popularity:8, description:"ガーデンプレイスのお洒落な街", ward:true },
  { name:"渋谷", line:"JR山手線", popularity:10, description:"スクランブル交差点と若者の街", ward:true },
  { name:"原宿", line:"JR山手線", popularity:8, description:"竹下通りと明治神宮", ward:true },
  { name:"代々木", line:"JR山手線", popularity:6, description:"代々木公園と予備校の街", ward:true },
  { name:"新宿", line:"JR山手線", popularity:10, description:"世界一の乗降客数を誇る街", ward:true },
  { name:"新大久保", line:"JR山手線", popularity:7, description:"コリアンタウンとして人気", ward:true },
  { name:"高田馬場", line:"JR山手線", popularity:7, description:"学生街の活気あるエリア", ward:true },
  { name:"目白", line:"JR山手線", popularity:5, description:"学習院と上品な住宅街", ward:true },
  { name:"池袋", line:"JR山手線", popularity:10, description:"サンシャインと巨大繁華街", ward:true },
  { name:"大塚", line:"JR山手線", popularity:5, description:"都電が走るレトロな下町", ward:true },

/* =====================================================================
   2) ストレージ補助
   localStorageを優先し、使えない環境（プレビュー等）では
   自動的にメモリ保存へフォールバックしてエラーを防ぐ。
   ===================================================================== */
const Store = (() => {
  let mem = {};                       // フォールバック用メモリ
  let ok = false;
  try {                               // localStorageが使えるか検査
    const k = "__test__";
    window.localStorage.setItem(k, "1");
    window.localStorage.removeItem(k);
    ok = true;
  } catch (e) { ok = false; }

  return {
    get(key, fallback){
      try {
        const raw = ok ? window.localStorage.getItem(key) : mem[key];
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) { return fallback; }
    },
    set(key, value){
      const raw = JSON.stringify(value);
      try { if (ok) window.localStorage.setItem(key, raw); else mem[key] = raw; }
      catch (e) { mem[key] = raw; }   // 容量超過などでも落とさない
    }
  };
})();

/* =====================================================================
   2.5) サウンドエンジン（Web Audio API）
   ---------------------------------------------------------------------
   外部音源ファイルを使わず、すべて波形を合成して鳴らす。
   そのため1ファイル・オフラインのまま効果音とBGMが動作する。
   ・効果音 : 回転チック / 当選ファンファーレ / ボタンクリック
   ・BGM    : チップチューン風の短いループ
   ※ブラウザ仕様により、音はユーザー操作後（unlock）に初めて鳴る。
   ===================================================================== */
const AudioEngine = (() => {
  let ctx = null;                  // AudioContext（遅延生成）
  let bgmGain = null;              // BGM用マスター音量
  let bgmOn = true, sfxOn = true;  // ON/OFF状態
  let bgmTimer = null;             // BGMスケジューラ
  let nextNoteTime = 0;            // 次の音を鳴らす時刻
  let stepIndex = 0;               // 現在のステップ
  let started = false;             // BGM開始済みフラグ

  // --- チップチューン風メロディ（16ステップでループ） ---
  // 主旋律（lead）。null は休符。
  const LEAD = [
    523.25, 659.25, 783.99, 659.25,  587.33, 698.46, 880.00, 698.46,
    659.25, 783.99, 1046.50, 783.99, 587.33, 523.25, 659.25, 587.33
  ];
  // ベース（bass）
  const BASS = [
    130.81, null, 196.00, null,  146.83, null, 196.00, null,
    164.81, null, 196.00, null,  130.81, null, 196.00, null
  ];
  const STEP_DUR = 0.19;           // 1ステップの長さ（秒）→ テンポ

  // AudioContextを用意し、停止状態なら再開（iOS等の制約対応）
  function ensure(){
    if (!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;        // 非対応ブラウザでも落とさない
      ctx = new AC();
      bgmGain = ctx.createGain();
      bgmGain.gain.value = 0.10;   // BGMは控えめな音量
      bgmGain.connect(ctx.destination);
    }
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }

  // 単音を鳴らす共通関数（簡易エンベロープ付き）
  function tone(freq, startAt, dur, type, vol, dest){
    if (!freq) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, startAt);
    g.gain.linearRampToValueAtTime(vol, startAt + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, startAt + dur);
    osc.connect(g).connect(dest || ctx.destination);
    osc.start(startAt);
    osc.stop(startAt + dur + 0.03);
  }

  // 1ステップ分（lead + bass）を指定時刻に予約
  function scheduleStep(i, time){
    tone(LEAD[i], time, STEP_DUR * 0.9, "square",   0.5, bgmGain);
    tone(BASS[i], time, STEP_DUR * 1.1, "triangle", 0.8, bgmGain);
  }

  // 先読みスケジューラ（カクつき防止のため少し先まで予約）
  function scheduler(){
    if (!ctx) return;
    while (nextNoteTime < ctx.currentTime + 0.12){
      scheduleStep(stepIndex, nextNoteTime);
      nextNoteTime += STEP_DUR;
      stepIndex = (stepIndex + 1) % LEAD.length;
    }
  }

  function startBgm(){
    if (!ctx || bgmTimer) return;
    nextNoteTime = ctx.currentTime + 0.05;
    stepIndex = 0;
    bgmTimer = setInterval(scheduler, 25);
    started = true;
  }
  function stopBgm(){
    if (bgmTimer){ clearInterval(bgmTimer); bgmTimer = null; }
  }

  return {
    // 最初のユーザー操作で呼ぶ。音声を有効化しBGMを開始。
    unlock(){
      ensure();
      if (bgmOn && ctx && !bgmTimer) startBgm();
    },
    // 回転中のチック音
    tick(){
      if (!sfxOn || !ensure()) return;
      const t = ctx.currentTime;
      tone(1180, t, 0.05, "square", 0.18);
    },
    // ボタンクリック音
    click(){
      if (!sfxOn || !ensure()) return;
      const t = ctx.currentTime;
      tone(660, t, 0.07, "square", 0.22);
    },
    // 当選ファンファーレ（上昇アルペジオ）
    win(){
      if (!sfxOn || !ensure()) return;
      const t = ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
      notes.forEach((f, i) => tone(f, t + i * 0.09, 0.22, "square", 0.28));
      // 余韻のキラキラ
      tone(1567.98, t + 0.45, 0.4, "triangle", 0.2);
    },
    // BGMのON/OFF。状態を返す。
    toggleBgm(){
      bgmOn = !bgmOn;
      ensure();
      if (bgmOn) startBgm(); else stopBgm();
      return bgmOn;
    },
    // 効果音のON/OFF。状態を返す。
    toggleSfx(){
      sfxOn = !sfxOn;
      return sfxOn;
    }
  };
})();

// 絞り込みフィルターの状態
const filterState = { ward: false, pop: false };

// 現在のフィルターに合致する駅プールを返す
function getPool(){
  return STATIONS.filter(s =>
    (!filterState.ward || s.ward === true) &&
    (!filterState.pop  || s.popularity >= 5)
  );
}

// プールからランダムに1駅選ぶ
function randomStation(){
  const pool = getPool();
  // 念のため空なら全駅から（通常は発生しない）
  const list = pool.length ? pool : STATIONS;
  return list[Math.floor(Math.random() * list.length)];
}

// 直前と同じ駅を避けて選ぶ（候補が2駅以上のとき）
let lastPickedName = null;
function pickStation(){
  const pool = getPool();
  const list = pool.length ? pool : STATIONS;
  let s = list[Math.floor(Math.random() * list.length)];
  if (list.length > 1 && s.name === lastPickedName){
    s = list[Math.floor(Math.random() * list.length)];  // もう一度引き直し
  }
  lastPickedName = s.name;
  return s;
}

/* ---- 番号ルーレット盤（本物のヨーロピアン・ルーレット配列） ---- */
// 盤面は固定。回した結果どの番号に止まるか分からない＝本物のルーレットの感覚。
// 止まったあとに、全636駅(＋フィルター)から抽選した駅を結果として公開する。
const ROULETTE_ORDER = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,
                        10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const RED_SET = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const SECTORS = ROULETTE_ORDER.length;          // 37
const SECTOR_DEG = 360 / SECTORS;

let wheelRotation = 0;    // 現在の回転角（度）

// 配列をシャッフル（Fisher-Yates）※他処理でも利用
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 中心から角度・半径で座標を求める（真上=0度、時計回り）
function wheelPoint(angleDeg, r){
  const t = angleDeg * Math.PI / 180;
  return { x: 100 + r * Math.sin(t), y: 100 - r * Math.cos(t) };
}

// 番号盤を描画（起動時に1度だけ呼ぶ。以後は固定）
function buildWheel(){
  const deg = SECTOR_DEG;
  let sectors = "", labels = "", studs = "";

  for (let i = 0; i < SECTORS; i++){
    const num = ROULETTE_ORDER[i];
    const a0 = i * deg, a1 = (i + 1) * deg;
    const p0 = wheelPoint(a0, 96), p1 = wheelPoint(a1, 96);
    // 0は緑、その他は赤/黒（本物のルーレット配色）
    const color = (num === 0) ? "#1faa59" : (RED_SET.has(num) ? "#d11f3a" : "#1c1c28");
    sectors += `<path d="M100 100 L ${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A 96 96 0 0 1 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} Z" fill="${color}" stroke="#f7d774" stroke-width="0.6"/>`;
    // 番号ラベル（放射状。下半分は反転して読みやすく）
    const ca = a0 + deg / 2;
    const flip = (ca > 90 && ca < 270) ? ' transform="rotate(180 100 22)"' : "";
    labels += `<g transform="rotate(${ca.toFixed(2)} 100 100)"><text x="100" y="22" text-anchor="middle"${flip} font-family="'M PLUS Rounded 1c',sans-serif" font-size="7.5" font-weight="800" fill="#fff">${num}</text></g>`;
    const ps = wheelPoint(a0, 96);
    studs += `<circle cx="${ps.x.toFixed(2)}" cy="${ps.y.toFixed(2)}" r="1.6" fill="#f7d774"/>`;
  }
  const ring = `<circle cx="100" cy="100" r="97.5" fill="none" stroke="#f7d774" stroke-width="3.5"/>`;
  const inner = `<circle cx="100" cy="100" r="40" fill="none" stroke="#f7d774" stroke-width="1.5" opacity=".5"/>`;
  wheelSvg.innerHTML = sectors + ring + inner + studs + labels;
}

// スピン開始
function startRoulette(){
  if (spinning) return;
  spinning = true;

  AudioEngine.unlock();
  startBtn.disabled = true;
  startBtn.textContent = "回転中…🌀";
  resultBox.classList.remove("show");

  const deg = SECTOR_DEG;

  // どの番号(区画)に止まるかをランダムに決定（盤面は固定）
  const winnerIndex = Math.floor(Math.random() * SECTORS);
  const winningNumber = ROULETTE_ORDER[winnerIndex];

  // 当選区画の中心を真上の指針に合わせる回転量を逆算
  const baseCenter = winnerIndex * deg + deg / 2;
  const jitter = (Math.random() * 2 - 1) * (deg / 2 - 1.5);  // 区画内に収まる範囲で揺らす
  const required = ((-baseCenter % 360) + 360) % 360 + jitter;
  const spins = 5 + Math.floor(Math.random() * 2);            // 5〜6回転
  const targetRot = spins * 360 + required;

  const duration = 4200 + Math.random() * 1500;
  const startT = performance.now();
  let lastTickStep = -1;

  wheelSvg.style.transform = "rotate(0deg)";

  function frame(now){
    const t = Math.min((now - startT) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);        // ease-out cubic で減速
    const r = targetRot * eased;
    wheelSvg.style.transform = `rotate(${r}deg)`;

    // 区画を1つ通過するごとにカチッと鳴らす（減速に合わせ間隔が自然に広がる）
    const step = Math.floor(r / deg);
    if (step !== lastTickStep){ lastTickStep = step; AudioEngine.tick(); }

    if (t < 1){
      requestAnimationFrame(frame);
    } else {
      wheelRotation = r % 360;
      // 止まってから全636駅(＋フィルター)より抽選して公開
      const station = pickStation();
      finishRoulette(station, winningNumber);
    }
  }
  requestAnimationFrame(frame);
}

function finishRoulette(station, winningNumber){
  spinning = false;
  startBtn.disabled = false;
  startBtn.innerHTML = '<span class="spark">✨</span> もう一回 <span class="spark">✨</span>';

  // 当選番号をバッジに表示
  const color = (winningNumber === 0) ? "緑" : (RED_SET.has(winningNumber) ? "赤" : "黒");
  resultBadge.textContent = `🎯 ${color}の ${winningNumber} に停止！`;

  showResult(station);   // 結果カード表示
  addHistory(station);   // 履歴へ追加
  launchConfetti();      // 紙吹雪
  AudioEngine.win();     // 当選ファンファーレ

  // 対応端末では軽く振動（演出の締め）
  if (navigator.vibrate) navigator.vibrate([30, 40, 30]);
}

/* XSS対策の簡易エスケープ */
function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, (c) => ({

  }[c]));
}

/* =====================================================================
   9) 紙吹雪エフェクト（停止時の演出）
   ===================================================================== */
const canvas = $("#confetti");
const ctx = canvas.getContext("2d");
let confettiParticles = [];
let confettiRunning = false;

function resizeCanvas(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const CONFETTI_COLORS = ["#ff4d8d","#ffd23f","#2ad4e6","#57e389","#ff8c42","#9b5de5","#ffffff"];

function launchConfetti(){
  // 画面上部から大量に降らせる
  for (let i = 0; i < 140; i++){
    confettiParticles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.3,
      size: 6 + Math.random() * 8,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI,
      vrot: (Math.random() - 0.5) * 0.3,
      shape: Math.random() > 0.5 ? "rect" : "circle"
    });
  }
  if (!confettiRunning){
    confettiRunning = true;
    requestAnimationFrame(updateConfetti);
  }
}

function updateConfetti(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confettiParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;             // 重力
    p.rot += p.vrot;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    if (p.shape === "rect"){
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size/2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });

  // 画面外に出た紙吹雪を除去
  confettiParticles = confettiParticles.filter(p => p.y < canvas.height + 30);

  if (confettiParticles.length > 0){
    requestAnimationFrame(updateConfetti);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confettiRunning = false;
  }
}

filterPop.addEventListener("click", () => {
  AudioEngine.unlock();
  AudioEngine.click();
  filterState.pop = !filterState.pop;
  filterPop.classList.toggle("on", filterState.pop);
  updateFilterCount();
  refreshIdleReel();
});

// 起動時、固定の番号盤を一度だけ描画
(function init(){
  updateFilterCount();           // 対象駅数を初期表示
  buildWheel();                  // 番号盤（0〜36）を構築
})();
</script>
</body>
</html>
