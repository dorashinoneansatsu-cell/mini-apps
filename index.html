<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="ちょっと便利でたのしいミニアプリ集。">
<meta name="theme-color" content="#ff6a45">
<title>ミニアプリ集 🎈</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23ff6a45'/%3E%3Ctext x='50' y='54' font-size='52' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%8E%88%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#fff4e2;--panel:#fffdf8;--ink:#2c1d15;--ink-soft:#7a6657;--coral:#ff6a45;--teal:#10b6a3;--sun:#ffc83d;--line:#2c1d15;--shadow:#2c1d15;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Zen Maru Gothic",-apple-system,sans-serif;color:var(--ink);background:var(--paper);min-height:100vh;
    background-image:radial-gradient(circle at 14% 16%,rgba(255,200,61,.30),transparent 40%),radial-gradient(circle at 86% 14%,rgba(16,182,163,.20),transparent 42%),radial-gradient(circle at 80% 90%,rgba(255,106,69,.18),transparent 46%);
    -webkit-font-smoothing:antialiased;padding:max(22px,env(safe-area-inset-top)) 18px 50px;}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(44,29,21,.05) 1.1px,transparent 1.1px);background-size:18px 18px;}
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;}
  header{text-align:center;margin:10px 0 26px;}
  .tag{display:inline-block;font-family:"Space Mono",monospace;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    background:var(--ink);color:var(--paper);padding:5px 12px;border-radius:999px;transform:rotate(-2deg);box-shadow:3px 3px 0 var(--coral);}
  h1{font-family:"Mochiy Pop One";font-size:clamp(30px,8vw,44px);line-height:1.1;margin:14px 0 4px;text-shadow:3px 3px 0 var(--sun),6px 6px 0 rgba(44,29,21,.12);}
  .sub{color:var(--ink-soft);font-weight:500;font-size:14px;}
  a.app{display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--ink);background:var(--panel);border:3px solid var(--line);
    border-radius:24px;box-shadow:6px 7px 0 var(--shadow);padding:20px;margin-bottom:18px;transition:transform .1s,box-shadow .1s;}
  a.app:active{transform:translate(6px,7px);box-shadow:0 0 0 var(--shadow);}
  a.app .ico{font-size:46px;flex:0 0 auto;width:66px;height:66px;display:grid;place-items:center;border:3px solid var(--line);border-radius:18px;background:var(--paper);}
  a.app .body{flex:1;min-width:0;}
  a.app .name{font-family:"Mochiy Pop One";font-size:21px;margin-bottom:3px;}
  a.app .desc{color:var(--ink-soft);font-size:13.5px;line-height:1.5;}
  a.app .arrow{font-size:22px;color:var(--ink-soft);flex:0 0 auto;}
  .app.a1 .ico{background:#ffe7df;} .app.a2 .ico{background:#fff0cf;} .app.a3 .ico{background:#e7ddff;}
  footer{text-align:center;color:var(--ink-soft);font-size:12px;font-family:"Space Mono",monospace;margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="tag">Mini Apps</span>
    <h1>ミニアプリ集🎈</h1>
    <p class="sub">ちょっと便利で、たのしい道具たち</p>
  </header>

  <a class="app a1" href="./meshi-decider.html">
    <div class="ico">🍚</div>
    <div class="body">
      <div class="name">何食べる〜？</div>
      <div class="desc">5つの質問に答えるだけで、今日のごはんを1つに決めてくれる。</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <a class="app a2" href="./emoji-translator.html">
    <div class="ico">🌀</div>
    <div class="body">
      <div class="name">絵文字翻訳機</div>
      <div class="desc">文章を入れると絵文字にほんやく。自分だけの辞書も作れる。</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <a class="app a3" href="./tokyo-roulette.html">
    <div class="ico">🎰</div>
    <div class="body">
      <div class="name">東京駅ルーレット</div>
      <div class="desc">ルーレットを回して、東京都内の駅をランダムに1つ。次のお出かけ先さがしに。</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <footer>ぜんぶブラウザの中で動きます</footer>
</div>
</body>
</html>
