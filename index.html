<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="ちょっと便利でたのしいミニアプリ集。">
<meta name="theme-color" content="#ff6a45">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ミニアプリ集">
<title>ミニアプリ集 🎈</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23ff6a45'/%3E%3Ctext x='50' y='54' font-size='52' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%8E%88%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon-apps.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#fff4e2;--panel:#fffdf8;--ink:#2c1d15;--ink-soft:#7a6657;--coral:#ff6a45;--teal:#10b6a3;--sun:#ffc83d;--line:#2c1d15;--shadow:#2c1d15;--field:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:"Zen Maru Gothic",-apple-system,sans-serif;color:var(--ink);background:var(--paper);min-height:100vh;
    background-image:radial-gradient(circle at 14% 16%,rgba(255,200,61,.30),transparent 40%),radial-gradient(circle at 86% 14%,rgba(16,182,163,.20),transparent 42%),radial-gradient(circle at 80% 90%,rgba(255,106,69,.18),transparent 46%);
    -webkit-font-smoothing:antialiased;padding:max(22px,env(safe-area-inset-top)) 18px 50px;}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(44,29,21,.05) 1.1px,transparent 1.1px);background-size:18px 18px;}
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;}
  header{text-align:center;margin:10px 0 24px;}
  .tag{display:inline-block;font-family:"Space Mono",monospace;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    background:var(--ink);color:var(--paper);padding:5px 12px;border-radius:999px;transform:rotate(-2deg);box-shadow:3px 3px 0 var(--coral);}
  h1{font-family:"Mochiy Pop One";font-size:clamp(30px,8vw,44px);line-height:1.1;margin:14px 0 4px;text-shadow:3px 3px 0 var(--sun),6px 6px 0 rgba(44,29,21,.12);}
  .sub{color:var(--ink-soft);font-weight:500;font-size:14px;}

  .card{background:var(--panel);border:3px solid var(--line);border-radius:24px;box-shadow:6px 7px 0 var(--shadow);margin-bottom:18px;overflow:hidden;}
  .open{display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--ink);padding:18px;cursor:pointer;transition:background .1s;}
  .open:active{background:#00000008;}
  .open .ico{font-size:42px;flex:0 0 auto;width:64px;height:64px;display:grid;place-items:center;border:3px solid var(--line);border-radius:18px;background:var(--paper);}
  .open .body{flex:1;min-width:0;}
  .open .name{font-family:"Mochiy Pop One";font-size:20px;margin-bottom:3px;}
  .open .desc{color:var(--ink-soft);font-size:13px;line-height:1.5;}
  .open .arrow{font-size:22px;color:var(--ink-soft);flex:0 0 auto;}
  .card.a1 .ico{background:#ffe7df;} .card.a2 .ico{background:#fff0cf;} .card.a3 .ico{background:#e7ddff;} .card.a4 .ico{background:#d9ecff;}
  .actions{display:flex;border-top:2px dashed #e3d8bd;}
  .actions button{flex:1;border:none;background:transparent;font-family:"Zen Maru Gothic";font-weight:700;font-size:13.5px;color:var(--ink);
    padding:12px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .1s;}
  .actions button:active{background:#00000008;}
  .actions button+button{border-left:2px dashed #e3d8bd;}

  footer{text-align:center;color:var(--ink-soft);font-size:12px;font-family:"Space Mono",monospace;margin-top:8px;line-height:1.8;}
  .hint{margin:6px auto 0;max-width:420px;background:var(--field);border:2px dashed var(--line);border-radius:14px;padding:11px 13px;color:var(--ink-soft);font-size:12.5px;font-family:"Zen Maru Gothic";font-weight:700;line-height:1.6;text-align:center;}

  /* modal */
  .bg{position:fixed;inset:0;background:rgba(44,29,21,.5);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;}
  .bg.show{display:flex;}
  .modal{background:var(--panel);border:3px solid var(--line);border-radius:24px;box-shadow:7px 8px 0 var(--shadow);padding:20px;max-width:340px;width:100%;text-align:center;}
  .modal .mname{font-family:"Mochiy Pop One";font-size:19px;margin-bottom:4px;}
  .modal .mhint{color:var(--ink-soft);font-size:12.5px;margin-bottom:14px;}
  .qrbox{background:#fff;border:3px solid var(--line);border-radius:16px;padding:14px;display:inline-flex;min-width:200px;min-height:200px;align-items:center;justify-content:center;}
  .qrbox img,.qrbox canvas{display:block;}
  .qrfail{color:var(--ink-soft);font-size:13px;line-height:1.6;}
  .urlbox{margin-top:14px;font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft);word-break:break-all;background:var(--paper);border:2px solid var(--line);border-radius:10px;padding:8px 10px;}
  .mbtns{display:flex;gap:8px;margin-top:14px;}
  .mbtns button{flex:1;border:3px solid var(--line);border-radius:14px;font-family:"Zen Maru Gothic";font-weight:700;font-size:14px;padding:11px;cursor:pointer;box-shadow:3px 3px 0 var(--shadow);transition:transform .1s,box-shadow .1s;}
  .mbtns button:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--shadow);}
  .mbtns .copy{background:var(--teal);color:#04302b;} .mbtns .close{background:var(--field);color:var(--ink);}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);font-weight:700;font-size:14px;
    padding:11px 20px;border-radius:999px;box-shadow:4px 4px 0 var(--coral);opacity:0;pointer-events:none;transition:.25s;z-index:90;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="tag">Mini Apps</span>
    <h1>ミニアプリ集🎈</h1>
    <p class="sub">タップで開く・URLコピー・QRで共有</p>
  </header>

  <div class="card a1">
    <a class="open" href="./meshi-decider.html">
      <div class="ico">🍚</div>
      <div class="body"><div class="name">何食べる〜？</div><div class="desc">5つの質問で、今日のごはんを1つに決定。</div></div>
      <div class="arrow">→</div>
    </a>
    <div class="actions"><button data-copy="meshi-decider.html">🔗 URLコピー</button><button data-qr="meshi-decider.html" data-name="何食べる〜？">📱 QR</button></div>
  </div>

  <div class="card a2">
    <a class="open" href="./emoji-translator.html">
      <div class="ico">🌀</div>
      <div class="body"><div class="name">絵文字翻訳機</div><div class="desc">文章を絵文字にほんやく。辞書も作れる。</div></div>
      <div class="arrow">→</div>
    </a>
    <div class="actions"><button data-copy="emoji-translator.html">🔗 URLコピー</button><button data-qr="emoji-translator.html" data-name="絵文字翻訳機">📱 QR</button></div>
  </div>

  <div class="card a3">
    <a class="open" href="./tokyo-roulette.html">
      <div class="ico">🎰</div>
      <div class="body"><div class="name">東京駅ルーレット</div><div class="desc">東京の駅をランダムに1つ。お出かけ先さがしに。</div></div>
      <div class="arrow">→</div>
    </a>
    <div class="actions"><button data-copy="tokyo-roulette.html">🔗 URLコピー</button><button data-qr="tokyo-roulette.html" data-name="東京駅ルーレット">📱 QR</button></div>
  </div>

  <div class="card a4">
    <a class="open" href="./nikukyu-travel.html">
      <div class="ico">🐾</div>
      <div class="body"><div class="name">肉球トラベル</div><div class="desc">旅行先をランダム・条件・3択で決定。どこ行く？に。</div></div>
      <div class="arrow">→</div>
    </a>
    <div class="actions"><button data-copy="nikukyu-travel.html">🔗 URLコピー</button><button data-qr="nikukyu-travel.html" data-name="肉球トラベル">📱 QR</button></div>
  </div>

  <p class="hint">💡 このページを「ホーム画面に追加」しておくと、アイコンから一発で開けます（共有ボタン → ホーム画面に追加）。</p>
  <footer>ぜんぶブラウザの中で動きます</footer>
</div>

<div class="bg" id="bg">
  <div class="modal">
    <div class="mname" id="mName"></div>
    <div class="mhint">スマホのカメラで読み取って開けます</div>
    <div class="qrbox" id="qrbox"></div>
    <div class="urlbox" id="mUrl"></div>
    <div class="mbtns"><button class="copy" id="mCopy">🔗 コピー</button><button class="close" id="mClose">閉じる</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<script>
  const $=id=>document.getElementById(id);
  const urlFor=file=>new URL(file, location.href).href;

  function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1600); }
  async function copy(text){
    try{ await navigator.clipboard.writeText(text); }
    catch(e){ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
    toast("URLをコピーしました ✓");
  }

  document.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",()=>copy(urlFor(b.dataset.copy))));

  let curUrl="";
  document.querySelectorAll("[data-qr]").forEach(b=>b.addEventListener("click",()=>openQR(urlFor(b.dataset.qr), b.dataset.name)));
  function openQR(url,name){
    curUrl=url; $("mName").textContent=name; $("mUrl").textContent=url;
    const box=$("qrbox"); box.innerHTML="";
    if(typeof QRCode!=="undefined"){
      try{ new QRCode(box,{text:url,width:200,height:200,correctLevel:QRCode.CorrectLevel.M}); }
      catch(e){ box.innerHTML='<div class="qrfail">QRを表示できませんでした。下のURLをコピーして共有してください。</div>'; }
    }else{
      box.innerHTML='<div class="qrfail">QRライブラリを読み込めませんでした（オフライン？）。下のURLをコピーして共有できます。</div>';
    }
    $("bg").classList.add("show");
  }
  $("mCopy").addEventListener("click",()=>copy(curUrl));
  $("mClose").addEventListener("click",()=>$("bg").classList.remove("show"));
  $("bg").addEventListener("click",e=>{ if(e.target.id==="bg") $("bg").classList.remove("show"); });
</script>
</body>
</html>
